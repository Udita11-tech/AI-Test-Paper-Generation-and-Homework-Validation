<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapters - AI Test Paper & Homework Validation</title>

    <!-- PDF.js for rendering PDF pages -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <!-- Tesseract.js for real OCR extraction -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

    <script src="https://resource.trickle.so/vendor_lib/unpkg/react@18/umd/react.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://resource.trickle.so/vendor_lib/unpkg/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://resource.trickle.so/vendor_lib/unpkg/lucide-static@0.516.0/font/lucide.css" rel="stylesheet">

    <style type="text/tailwindcss">
    @layer theme {
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-body: #f8fafc;
            --text-main: #0f172a;
            --border-color: #e2e8f0;
        }
    }

    @layer base { 
        body { 
            @apply bg-[var(--bg-body)] text-[var(--text-main)] antialiased font-sans; 
        } 
    }

    @layer components {
        .btn-primary { 
            @apply bg-[var(--primary)] text-white px-4 py-2 rounded-lg hover:bg-[var(--primary-hover)] transition-colors font-medium flex items-center gap-2; 
        }

        .btn-secondary { 
            @apply bg-white text-gray-700 border border-gray-300 px-4 py-2 rounded-lg hover:bg-gray-50 transition-colors font-medium flex items-center gap-2; 
        }

        .card { 
            @apply bg-white rounded-xl shadow-sm border border-[var(--border-color)] overflow-hidden; 
        }

        .input-field {
            @apply w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-[var(--primary)] focus:outline-none;
        }
    }
    </style>
</head>

<body>
    <div id="root"></div>
    <script src="config.js"></script>

    <script type="text/babel" src="utils/api.js"></script>
    <script type="text/babel" src="layouts/Sidebar.js"></script>
    <script type="text/babel" src="layouts/Header.js"></script>
    <script type="text/babel" src="layouts/DashboardLayout.js"></script>
    <script type="text/babel" src="chapters-app.js"></script>
</body>
</html>
