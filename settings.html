<head>

    <script src="https://resource.trickle.so/vendor_lib/unpkg/react-dom@18/umd/react-dom.production.min.js"></script>

    <style type="text/tailwindcss">
    @layer theme {
        :root { --primary: #4f46e5; --bg-body: #f8fafc; --text-main: #0f172a; --border-color: #e2e8f0; }
    }
    @layer base { body { @apply bg-[var(--bg-body)] text-[var(--text-main)] antialiased font-sans; } }
    @layer components {
        .btn-primary { @apply bg-[var(--primary)] text-white px-4 py-2 rounded-lg font-medium flex items-center gap-2 hover:bg-indigo-700; }
        .card { @apply bg-white rounded-xl shadow-sm border border-[var(--border-color)] p-6; }
        .input-field { @apply w-full border border-[var(--border-color)] rounded-lg px-3 py-2 mt-1 focus:ring-2 focus:ring-[var(--primary)] outline-none; }
    }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" src="layouts/Sidebar.js"></script>
