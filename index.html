<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AI Test Paper & Homework Validation</title>
    <meta name="description" content="AI-powered educational platform for teachers to generate test papers and evaluate homework.">

    <style type="text/tailwindcss">
    @layer theme {
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-body: #f8fafc;
            --bg-sidebar: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }
    }

    @layer base {
        body {
            @apply bg-[var(--bg-body)] text-[var(--text-main)] antialiased font-sans;
        }
    }

    @layer components {
        .btn-primary {
            @apply bg-[var(--primary)] text-white px-4 py-2 rounded-lg hover:bg-[var(--primary-hover)] transition-colors font-medium flex items-center gap-2;
        }
        .btn-secondary {
            @apply bg-white text-gray-700 border border-gray-300 px-4 py-2 rounded-lg hover:bg-gray-50 transition-colors font-medium flex items-center gap-2;
        }
        .card {
            @apply bg-white rounded-xl shadow-sm border border-[var(--border-color)] overflow-hidden;
        }
        .input-field {
            @apply w-full border border-[var(--border-color)] rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-[var(--primary)] focus:border-transparent transition-all;
        }
    }
    </style>
    <script>
        const ChartJS = window.Chart;
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" src="utils/api.js"></script>
    <script type="text/babel" src="components/StatCard.js"></script>
    <script type="text/babel" src="components/Chart.js"></script>
    <script type="text/babel" src="layouts/Sidebar.js"></script>
    <script type="text/babel" src="layouts/Header.js"></script>
    <script type="text/babel" src="layouts/DashboardLayout.js"></script>
    <script type="text/babel" src="app.js"></script>
</body>
</html>
